name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ios-tests:
    runs-on: macos-15

    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create Empty Secrets File
        run: |
          if [ ! -f Ledger/Secrets.swift ]; then
            cat <<'EOF' > Ledger/Secrets.swift
          enum Secrets {
              static let anthropicAPIKey = ""
          }
          EOF
          fi

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Resolve Simulator
        id: simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | awk -F '[()]' '
            /iPhone .*Booted/ { print $(NF-1); exit }
            /iPhone .*Shutdown/ { print $(NF-1); exit }
          ')

          if [ -z "$DEVICE_ID" ]; then
            echo "No available iPhone simulator found." >&2
            exit 1
          fi

          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Run Deterministic Test Suite
        run: |
          set -o pipefail
          xcodebuild \
            -project Ledger.xcodeproj \
            -scheme Ledger \
            -destination "id=${{ steps.simulator.outputs.device_id }}" \
            -resultBundlePath TestResults.xcresult \
            test

      - name: Upload XCResult
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ledger-test-results
          path: TestResults.xcresult
