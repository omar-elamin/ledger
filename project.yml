name: Ledger
options:
  bundleIdPrefix: com.omarelamin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
targets:
  Ledger:
    type: application
    platform: iOS
    sources:
      - path: Ledger
        excludes:
          - Secrets.swift.example
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.omarelamin.ledger
        INFOPLIST_FILE: Ledger/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  LedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LedgerTests
    dependencies:
      - target: Ledger
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
  LedgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LedgerUITests
    dependencies:
      - target: Ledger
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  LedgerLiveAPITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LedgerLiveAPITests
    dependencies:
      - target: Ledger
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Ledger:
    build:
      targets:
        Ledger: all
    test:
      gatherCoverageData: true
      coverageTargets:
        - Ledger
      targets:
        - LedgerTests
        - LedgerUITests
  "Ledger Live API":
    build:
      targets:
        Ledger: all
    test:
      targets:
        - LedgerLiveAPITests
